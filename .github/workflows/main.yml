name: update-readme
permissions:
  contents: write
on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *" # Runs once a day at 05:00 UTC (07:00 in Paris during DST)
jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install requests
        run: python -m pip install --upgrade pip requests

      - name: Install dotenv
        run: python -m pip install --upgrade pip python-dotenv
      - name: Run update_readme.py
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python scripts/update_readme.py

      - name: Commit and push README if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet README.md; then
            echo "No changes in README.md"
            exit 0
          fi

          git add README.md
          git commit -m "chore: update README"
          git push origin HEAD:${GITHUB_REF_NAME}

  sendNotification:
    runs-on: ubuntu-latest
    needs: update-readme
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install requests
        run: python -m pip install --upgrade pip requests

      - name: Install dotenv
        run: python -m pip install --upgrade pip python-dotenv
      - name: Run send_notification.py
        env:
          DISCORD_BOT_URL: ${{ secrets.DISCORD_BOT_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python scripts/notifDiscord.py
